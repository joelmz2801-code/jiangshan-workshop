<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>真实案例 — KLB工坊 | Real Cases — KLB Workshop</title>
    <meta
      name="description"
      content="KLB工坊真实修复案例展示，修复前后对比效果。Real before/after repair cases from KLB Workshop."
    />

    <!-- 字体预连接 + 加载 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- 主题初始化（避免 FOUC） -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var isMobile = window.matchMedia('(max-width: 768px)').matches;
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved || (isMobile ? 'light' : (prefersDark ? 'dark' : 'light'));
          var root = document.documentElement;
          root.classList.remove('light', 'dark');
          root.classList.add(theme);
        } catch (e) {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main-cases.tsx"></script>
  </body>
</html>
